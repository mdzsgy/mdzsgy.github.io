<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Claude Code介绍</title>
    <style>
        /* 标签选择器：全局基础样式 */
        body {
            font-family: "微软雅黑", sans-serif;
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
            background: #f5f7fa;
        }

        /* ID选择器：主标题（唯一） */
        #main-title {
            font-size: 30px;
            text-align: center;
            line-height: 1.8;
            color: #2196F3;
            font-weight: bold;
            padding-bottom: 10px;
            border-bottom: 1px solid #2196F3;
        }

        /* 类选择器：小标题 */
        .sub-title {
            font-size: 22px;
            line-height: 1.8;
            color: #333;
            font-weight: bold;
            margin: 25px 0 10px;
        }

        /* 标签选择器：正文段落 */
        p {
            font-size: 16px;
            line-height: 1.8;
            color: #444;
            text-indent: 2em;
            margin-bottom: 15px;
        }

        /* 类选择器：无序列表（自定义图片标号） */
        .feature-list {
            font-size: 16px;
            line-height: 1.8;
            color: #444;
            margin-left: 30px;
            /* 10px左右的小图标作为列表标号 */
            list-style-image: url('1.png');
            padding-left: 10px;
        }

        /* 高亮样式（类选择器） */
        .mark {
            background: #fff380;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 主标题：1个 -->
    <h1 id="main-title">Claude Code —— 智能AI编程助手</h1>

    <!-- 第一个小标题 -->
    <h2 class="sub-title">什么是 Claude Code?</h2>
    <!-- 第一段正文 -->
    <p>Claude Code 是由 Anthropic 公司推出的<span class="mark">AI编程助手</span>，可以帮助初学者快速写代码、查错误、学逻辑，非常适合新手学习。</p >

    <!-- 第二个小标题 -->
    <h2 class="sub-title">Claude Code 核心优势</h2>
    <!-- 无序列表：1个 -->
    <ul class="feature-list">
        <li>支持HTML、CSS、JavaScript、Python等多种语言</li>
        <li>智能代码提示与自动修复</li>
        <li>代码逻辑详细讲解</li>
        <li>免费使用基础功能</li>
        <li>界面简洁、容易上手</li>
    </ul>

    <!-- 第二段正文 -->
    <p>如果你正在学习编程，<span class="mark">Claude Code</span> 会是你学习路上非常好的帮手，随时解答你的编程问题。</p >
</body>
</html>
