<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>网上书城 - 注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 微软雅黑;
        }
         .all-box {
            width: 400px;
            border: 1px solid #999;
            background: #acaaaa;
            padding: 0 30px 30px 30px;
         }
        /* 页面大背景白色 */
        body {
            background: #fff;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }
        .wrap {
            width: 400px;
            border: 1px solid #c3c2c2;
            background: #fff;
        }
        /* 网上书城区域：深灰色背景方框 */
        .top-box {
            border: 1px solid #999;
            margin: 0-1px 15px;
            background: #555;
            color: #fff;
            text-align: center;
            padding: 10px;
            font-size: 15px;
        }
          .title-box {
            border: 1px solid #999;
            /* 白色 → 灰色 线性渐变 */
            background: linear-gradient(#ffffff, #cccccc);
            padding: 8px 10px;
            margin-bottom: 15px;
        }
       
        
        /* 白色线条方框：包裹标题、输入项、按钮 */
        .white-line-box {
            border: 1px solid #fff;
            padding: 15px;
        }
        .reg-title {
            font-size: 14px;
            margin-bottom: 15px;
            color: #fff;
        }
        .reg-title::before {
            content: "+";
            color: #fff;
            margin-right: 6px;
        }
        .item {
            position: relative;
            margin-bottom: 12px;
        }
        .item:last-child {
            margin-bottom: 0;
        }
        .item label {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: #666;
        }
        .item input {
            width: 100%;
            height: 24px;
            border: 1px solid #999;
            padding-left: 60px;
            padding-right: 8px;
            background: #fff;
        }
        .btn {
            width: 100%;
            height: 30px;
            background: #555;
            color: #fff;
            border: 1px solid #fff;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>
     <div class="all-box">
        <!-- 网上书城 深灰色方框 -->
        <div class="top-box">网上书城</div>

        <!-- 外层深灰色区域 -->
        <div class="content-wrap">
            <!-- 白色线条方框：包裹全部表单内容 -->
            <div class="white-line-box">
                 <div class="title-box">+ 注册新用户</div>
               

                <div class="item">
                    <label>
                    👤用户名</label>
                    <input type="text">
                </div>
                <div class="item">
                    <label>
                    🔒密码</label>
                    <input type="password">
                </div>
                <div class="item">
                    <label>
                    🔑确认密码</label>
                    <input type="password">
                </div>
                <div class="item">
                    <label> 
                    📧电子邮件</label>
                    <input type="email">
                </div>

                <button class="btn">注册新用户</button>
            </div>
        </div>
    </div>
</body>
</html>
